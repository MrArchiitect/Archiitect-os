---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: archiitect-os
description: A gaming and design OS built on Bazzite.

base-image: ghcr.io/ublue-os/bazzite-deck
image-version: stable

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.blender.Blender
      - scope: user

  - type: signing
